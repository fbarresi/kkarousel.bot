name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read project version from pyproject.toml
        id: project_version
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: tags
        run: |
          VERSION="${{ steps.project_version.outputs.version }}.${{ github.run_number }}"
          echo "version_tag=fbarresi/kkarousel.bot:$VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_tag=fbarresi/kkarousel.bot:latest" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            ${{ steps.tags.outputs.version_tag }}
            ${{ steps.tags.outputs.latest_tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tags.outputs.version }}
          name: v${{ steps.tags.outputs.version }}
          body: |
            ## Docker image

            ```
            docker pull fbarresi/kkarousel.bot:${{ steps.tags.outputs.version }}
            ```

